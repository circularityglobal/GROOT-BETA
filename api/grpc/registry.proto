syntax = "proto3";

package refinet.registry.v1;

// ── Messages ──────────────────────────────────────────────────

message Project {
  string id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  string chain = 5;
  string category = 6;
  repeated string tags = 7;
  int32 star_count = 8;
  int32 fork_count = 9;
  string owner_username = 10;
  string created_at = 11;
  string updated_at = 12;
  string visibility = 13;
  string readme = 14;
}

message ABI {
  string id = 1;
  string project_id = 2;
  string contract_name = 3;
  string contract_address = 4;
  string chain = 5;
  string abi_json = 6;
  string compiler_version = 7;
  bool is_verified = 8;
  string created_at = 9;
}

message SDK {
  string id = 1;
  string project_id = 2;
  string name = 3;
  string language = 4;
  string version = 5;
  string package_name = 6;
  string install_command = 7;
  string documentation = 8;
  string readme_content = 9;
  string created_at = 10;
}

message ExecutionLogic {
  string id = 1;
  string project_id = 2;
  string name = 3;
  string description = 4;
  string function_signature = 5;
  string logic_type = 6;
  string input_schema = 7;
  string output_schema = 8;
  string chain = 9;
  int32 gas_estimate = 10;
  bool is_read_only = 11;
  bool is_verified = 12;
  int32 execution_count = 13;
  string created_at = 14;
}

// ── Request/Response ──────────────────────────────────────────

message SearchRequest {
  string query = 1;
  string chain = 2;
  string category = 3;
  int32 page = 4;
  int32 page_size = 5;
  string sort_by = 6;
}

message ProjectListResponse {
  repeated Project projects = 1;
  int32 total = 2;
  int32 page = 3;
  bool has_next = 4;
}

message ProjectRequest {
  string slug = 1;
}

message ProjectDetailResponse {
  Project project = 1;
  repeated ABI abis = 2;
  repeated SDK sdks = 3;
  repeated ExecutionLogic logic = 4;
}

message ABIRequest {
  string id = 1;
}

message SDKRequest {
  string id = 1;
}

message LogicRequest {
  string id = 1;
}

message DecodeRequest {
  string abi_json = 1;
  string calldata = 2;
}

message DecodeResponse {
  string function_name = 1;
  string signature = 2;
  string decoded_args_json = 3;
}

message EncodeRequest {
  string abi_json = 1;
  string function_name = 2;
  string args_json = 3;
}

message EncodeResponse {
  string signature = 1;
  string note = 2;
}

message ContractInterfaceRequest {
  string abi_json = 1;
}

message FunctionEntry {
  string name = 1;
  string type = 2;
  string state_mutability = 3;
  string inputs_json = 4;
  string outputs_json = 5;
}

message ContractInterfaceResponse {
  repeated FunctionEntry functions = 1;
  repeated FunctionEntry events = 2;
  int32 total_functions = 3;
  int32 total_events = 4;
}

message ToolCallRequest {
  string tool_name = 1;
  string arguments_json = 2;
}

message ToolCallResponse {
  string result_json = 1;
  string error = 2;
}

message ToolListRequest {}

message ToolDefinition {
  string name = 1;
  string description = 2;
  string input_schema_json = 3;
}

message ToolListResponse {
  repeated ToolDefinition tools = 1;
}

message UserProfileRequest {
  string username = 1;
}

message UserProfileResponse {
  string username = 1;
  string eth_address = 2;
  string tier = 3;
  int32 project_count = 4;
  int32 stars_given = 5;
  int32 total_stars_received = 6;
  string joined_at = 7;
}

// ── Service ───────────────────────────────────────────────────

service RegistryService {
  // Search and discovery
  rpc SearchProjects(SearchRequest) returns (ProjectListResponse);
  rpc GetProject(ProjectRequest) returns (ProjectDetailResponse);
  rpc GetUserProfile(UserProfileRequest) returns (UserProfileResponse);

  // Individual resource access
  rpc GetABI(ABIRequest) returns (ABI);
  rpc GetSDK(SDKRequest) returns (SDK);
  rpc GetExecutionLogic(LogicRequest) returns (ExecutionLogic);

  // ABI utilities
  rpc DecodeFunction(DecodeRequest) returns (DecodeResponse);
  rpc EncodeFunction(EncodeRequest) returns (EncodeResponse);
  rpc GetContractInterface(ContractInterfaceRequest) returns (ContractInterfaceResponse);

  // Server streaming — search results streamed one-by-one
  rpc StreamSearchResults(SearchRequest) returns (stream Project);

  // Bidirectional streaming — real-time tool execution
  rpc ToolStream(stream ToolCallRequest) returns (stream ToolCallResponse);

  // Tool discovery
  rpc ListTools(ToolListRequest) returns (ToolListResponse);
}

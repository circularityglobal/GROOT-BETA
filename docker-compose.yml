version: '3.8'

# REFINET Cloud — Local Development Environment
# NOT for production. Production uses systemd directly.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
      - "50051:50051"  # gRPC
    volumes:
      - ./api:/app/api
      - ./data:/opt/refinet/data
    env_file: .env
    environment:
      - PUBLIC_DB_URL=sqlite:////opt/refinet/data/public.db
      - INTERNAL_DB_URL=sqlite:////opt/refinet/data/internal.db
      - GRPC_PORT=50051
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    command: npm run dev
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:4000', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Product Subdomains ──────────────────────────────────────────

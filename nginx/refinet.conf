# =============================================================================
# REFINET Cloud — Nginx Production Configuration
# TLS termination + reverse proxy to FastAPI + SSE streaming support
# =============================================================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

# Upstream
upstream refinet_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.refinet.io app.refinet.io infrastructure.refinet.io browser.refinet.io;
    return 301 https://$server_name$request_uri;
}

# API server (api.refinet.io)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.refinet.io;

    # TLS (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/api.refinet.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.refinet.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request size limit
    client_max_body_size 10m;

    # Auth endpoints — strict rate limit
    location /auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://refinet_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Inference endpoints — SSE streaming support
    location /v1/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://refinet_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;

        # Long timeout for inference
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # GraphQL endpoint (with WebSocket support for subscriptions)
    location /graphql {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://refinet_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for GraphQL subscriptions
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # WebSocket endpoint for registry real-time
    location /ws/ {
        proxy_pass http://refinet_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # SOAP endpoint
    location /soap {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://refinet_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other API routes
    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://refinet_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block internal ports from external access
    location /admin/ {
        # Extra protection: require X-Admin-Secret header
        proxy_pass http://refinet_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check (no rate limit)
    location = /health {
        proxy_pass http://refinet_api;
        proxy_set_header Host $host;
    }

    access_log /var/log/nginx/refinet-api.access.log;
    error_log /var/log/nginx/refinet-api.error.log;
}

# Frontend (app.refinet.io) — static files
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.refinet.io;

    ssl_certificate /etc/letsencrypt/live/app.refinet.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.refinet.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /opt/refinet/frontend/out;
    index index.html;

    # SPA routing — fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long cache
    location /_next/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /groot-mark.svg {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/refinet-app.access.log;
    error_log /var/log/nginx/refinet-app.error.log;
}

# =============================================================================
# REFINET Products — Subdomain Servers
# Each product is a separate repo deployed to /opt/refinet/products/<name>/out
# =============================================================================

# REFINET Pillars (infrastructure.refinet.io)
# Gopher servers with REFINET infrastructure built in
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name infrastructure.refinet.io;

    ssl_certificate /etc/letsencrypt/live/infrastructure.refinet.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/infrastructure.refinet.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /opt/refinet/products/pillars/out;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long cache
    location /_next/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    access_log /var/log/nginx/refinet-pillars.access.log;
    error_log /var/log/nginx/refinet-pillars.error.log;
}

# REFINET Browser (browser.refinet.io)
# A browser leveraging REFINET Pillars for sovereign internet access
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name browser.refinet.io;

    ssl_certificate /etc/letsencrypt/live/browser.refinet.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/browser.refinet.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /opt/refinet/products/browser/out;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long cache
    location /_next/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    access_log /var/log/nginx/refinet-browser.access.log;
    error_log /var/log/nginx/refinet-browser.error.log;
}
